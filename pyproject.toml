    "vl-convert-python>=1.9.0.post1",
    "weasyprint>=68.1",
]

[project.scripts]
mdcc = "mdcc.cli:app"

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "pytest>=9.0.2",
    "ruff>=0.15.5",
]
